<!DOCTYPE html>
<html>
<head>
    <title>AI Phishing Website Detection System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #141E30, #243B55, #000428, #004e92);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    width: 420px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.loader {
    display: none;
    margin-top: 15px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #ff4b2b;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin-left: auto;
    margin-right: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    animation: pop 0.5s ease;
}

@keyframes pop {
    0% { transform: scale(0.8); opacity: 0;}
    100% { transform: scale(1); opacity: 1;}
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
}
</style>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</head>

<body>

<div class="card">
    <h2>🤖 AI Phishing Website Detection</h2>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="url" placeholder="Enter Website URL">
        <br>
        <button type="submit">Analyze Website</button>
    </form>

    <div id="loader" class="loader"></div>

    {% if result %}
        <div class="result">
            {{ result }}
        </div>
    {% endif %}

    <div class="footer">
        Developed by Aryan Besekar 🚀
    </div>

</div>

</body>
</html>
